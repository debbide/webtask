<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WebTask 面板</title>
    <link rel="stylesheet" href="dashboard.css" />
  </head>
  <body>
    <div class="app">
      <header class="header-row">
        <div>
          <div class="title">WebTask</div>
          <div class="subtitle">基于 Webhook 的任务执行器</div>
        </div>
      </header>

      <section class="panel">
        <div class="label">Webhook 地址</div>
        <div class="row">
          <input id="webhook-input" type="text" placeholder="http://localhost:3000" />
          <button id="save-btn" class="btn">保存</button>
          <button id="test-connection" class="secondary btn">测试</button>
        </div>
        <div class="hint">可填基地址或 /api/webtask，插件会自动拼接 /pending 与 /report</div>
        <div class="row">
          <input id="api-key-input" type="password" placeholder="API Key (可选)" />
        </div>
        <div class="row">
          <select id="protocol-select">
            <option value="webtask">WebTask 协议（/pending）</option>
            <option value="shuaxin">刷新协议（/poll）</option>
          </select>
          <input id="client-id-input" type="text" readonly placeholder="Client ID" />
          <button id="copy-client-id" class="secondary btn">复制ID</button>
          <input
            id="interval-input"
            type="number"
            min="0.05"
            step="0.05"
            placeholder="0.25"
          />
          <div class="hint">轮询间隔（分钟）</div>
        </div>
        <div class="hint">target_client_id 请填这个 Client ID</div>
        <div id="status" class="status">状态：--</div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div class="label">任务</div>
          <div class="actions">
            <input id="task-search" type="text" placeholder="搜索任务" />
            <button id="import-open" class="secondary btn">+ 导入</button>
          </div>
        </div>
        <div class="task-list">
          <div class="task-header">
            <div class="col-toggle">启用</div>
            <div class="col-name">任务</div>
            <div class="col-type">类型</div>
            <div class="col-last">最近运行</div>
            <div class="col-status">状态</div>
            <div class="col-actions">操作</div>
          </div>
          <div id="tasks" class="task-rows"></div>
        </div>
      </section>

    </div>

    <div id="import-modal" class="modal hidden">
      <div class="modal-card modal-wide">
        <div class="modal-title">导入任务 JSON</div>
        <textarea
          id="import-text"
          placeholder="{\n  \"name\": \"sample_task\",\n  \"label\": \"示例任务\",\n  \"url\": \"https://example.com\",\n  \"defaultData\": {},\n  \"steps\": [\n    {\"action\": \"wait\", \"ms\": 1000},\n    {\"action\": \"getText\", \"selector\": \".result\", \"as\": \"result\"}\n  ]\n}"
        ></textarea>
        <div id="import-error" class="modal-error"></div>
        <div class="modal-actions">
          <button id="import-confirm" class="btn">导入</button>
          <button id="import-cancel" class="secondary btn">取消</button>
        </div>
      </div>
    </div>

    <div id="logs-modal" class="modal hidden">
      <div class="modal-card modal-wide">
        <div class="modal-title">任务日志</div>
        <div class="modal-sub" id="logs-modal-title"></div>
        <div id="logs-modal-list" class="log-list"></div>
        <div class="modal-actions">
          <button id="logs-modal-close" class="secondary btn">关闭</button>
        </div>
      </div>
    </div>

    <script src="dashboard.js"></script>
  </body>
</html>
